# Local development — MySQL + free monitoring stack (API runs on host via npm run dev)
services:
  mysql:
    image: mysql:8.0
    container_name: anchor-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: anchor_root
      MYSQL_DATABASE: anchor_db
      MYSQL_USER: anchor_user
      MYSQL_PASSWORD: anchor_pass
    volumes:
      - anchor_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-panchor_root"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: anchor-mysqld-exporter
    restart: unless-stopped
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=root:anchor_root
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: anchor-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - anchor_prometheus_data:/prometheus

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: anchor-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - anchor_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  anchor_mysql_data:
  anchor_prometheus_data:
  anchor_grafana_data:
