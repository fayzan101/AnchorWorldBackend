name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          # Stream output so mid-script failures are visible in Actions logs
          command_timeout: 20m
          script: |
            set -euo pipefail
            export NODE_ENV=production

            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/repositories/anchor-backend"; fi
            echo "→ APP_DIR=$APP_DIR"
            cd "$APP_DIR"

            PREV_SHA="$(git rev-parse HEAD 2>/dev/null || echo none)"
            echo "→ fetching origin/master (was $PREV_SHA)"
            git fetch origin --depth=50
            git reset --hard origin/master
            NEW_SHA="$(git rev-parse HEAD)"
            echo "→ now at $NEW_SHA"

            echo "→ ensuring upload dirs"
            mkdir -p uploads/posts uploads/messages
            chmod -R u+rwX,go+rX uploads 2>/dev/null || true

            hash_file() {
              if [ -f "$1" ]; then sha256sum "$1" | awk '{print $1}'; else echo "missing:$1"; fi
            }

            echo "→ checking lockfile"
            LOCKFILE_HASH="$(hash_file package-lock.json)"
            INSTALL_HASH_FILE=".npm-ci.lockhash"
            if [ ! -d node_modules ] || [ ! -f "$INSTALL_HASH_FILE" ] || [ "$LOCKFILE_HASH" != "$(cat "$INSTALL_HASH_FILE" 2>/dev/null || true)" ]; then
              echo "→ npm ci"
              npm ci --prefer-offline --no-audit --no-fund
              printf '%s' "$LOCKFILE_HASH" > "$INSTALL_HASH_FILE"
            else
              echo "→ skip npm ci (lockfile unchanged)"
            fi

            # Stable source hash without fragile xargs -0 pipelines
            echo "→ computing source hash"
            SRC_HASH="$(
              {
                find src -type f \( -name '*.ts' -o -name '*.json' -o -name '*.yaml' -o -name '*.yml' \) 2>/dev/null
                printf '%s\n' package.json tsconfig.json
              } | sort | while IFS= read -r f; do
                [ -f "$f" ] || continue
                sha256sum "$f"
              done | sha256sum | awk '{print $1}'
            )"
            BUILD_HASH_FILE=".build.src.hash"
            NEED_BUILD=0
            if [ ! -d dist ] || [ ! -f dist/server.js ] || [ ! -f "$BUILD_HASH_FILE" ] || [ "$SRC_HASH" != "$(cat "$BUILD_HASH_FILE" 2>/dev/null || true)" ]; then
              NEED_BUILD=1
            fi

            if [ "$NEED_BUILD" = "1" ]; then
              echo "→ npm run build"
              npm run build
              printf '%s' "$SRC_HASH" > "$BUILD_HASH_FILE"
            else
              echo "→ skip build (sources unchanged)"
            fi

            if [ ! -f dist/server.js ]; then
              echo "→ dist/server.js missing; forcing build" >&2
              npm run build
              printf '%s' "$SRC_HASH" > "$BUILD_HASH_FILE"
            fi

            echo "→ migrate:prod"
            npm run migrate:prod

            echo "→ seed check"
            if [ -f src/scripts/seed-circles.ts ]; then
              SEED_HASH="$(hash_file src/scripts/seed-circles.ts)"
              SEED_HASH_FILE=".seed-circles.hash"
              if [ ! -f "$SEED_HASH_FILE" ] || [ "$SEED_HASH" != "$(cat "$SEED_HASH_FILE" 2>/dev/null || true)" ]; then
                echo "→ seed:circles"
                if [ -f dist/scripts/seed-circles.js ]; then
                  node dist/scripts/seed-circles.js || echo "⚠ seed failed (non-fatal)" >&2
                else
                  npm run seed:circles || echo "⚠ seed failed (non-fatal)" >&2
                fi
                printf '%s' "$SEED_HASH" > "$SEED_HASH_FILE"
              else
                echo "→ skip seed (unchanged)"
              fi
            else
              echo "→ skip seed (script not found)"
            fi

            echo "→ pm2"
            if [ "$PREV_SHA" = "$NEW_SHA" ] && [ "$NEED_BUILD" = "0" ]; then
              echo "→ no code changes; ensuring process is up"
              if ! pm2 describe anchor-backend >/dev/null 2>&1; then
                pm2 start dist/server.js --name anchor-backend
                pm2 save || true
              fi
            else
              if pm2 describe anchor-backend >/dev/null 2>&1; then
                pm2 reload anchor-backend --update-env || pm2 restart anchor-backend --update-env
              else
                pm2 start dist/server.js --name anchor-backend
                pm2 save || true
              fi
            fi

            echo "→ health check"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
                echo "→ healthy"
                curl -fsS http://127.0.0.1:3000/health
                exit 0
              fi
              sleep 1
            done

            echo "Health check failed after waiting for the app to start" >&2
            pm2 describe anchor-backend || true
            pm2 logs anchor-backend --lines 80 --nostream || true
            exit 1
