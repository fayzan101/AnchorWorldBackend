name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/repositories/anchor-backend"; fi
            cd "$APP_DIR"

            PREV_SHA="$(git rev-parse HEAD 2>/dev/null || echo none)"
            git fetch origin --depth=50
            git reset --hard origin/master
            NEW_SHA="$(git rev-parse HEAD)"

            mkdir -p uploads/posts uploads/messages
            chmod -R 755 uploads

            # Install deps only when lockfile changed
            LOCKFILE_HASH="$(sha256sum package-lock.json | awk '{print $1}')"
            INSTALL_HASH_FILE=".npm-ci.lockhash"
            if [ ! -d node_modules ] || [ ! -f "$INSTALL_HASH_FILE" ] || [ "$LOCKFILE_HASH" != "$(cat "$INSTALL_HASH_FILE")" ]; then
              echo "→ npm ci (lockfile changed)"
              npm ci --prefer-offline --no-audit --no-fund
              printf '%s' "$LOCKFILE_HASH" > "$INSTALL_HASH_FILE"
            else
              echo "→ skip npm ci (lockfile unchanged)"
            fi

            # Rebuild only when TS sources / config / swagger change
            SRC_HASH="$(find src package.json tsconfig.json -type f \( -name '*.ts' -o -name '*.json' -o -name '*.yaml' -o -name '*.yml' \) -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
            BUILD_HASH_FILE=".build.src.hash"
            NEED_BUILD=0
            if [ ! -d dist ] || [ ! -f "$BUILD_HASH_FILE" ] || [ "$SRC_HASH" != "$(cat "$BUILD_HASH_FILE")" ]; then
              NEED_BUILD=1
            fi

            if [ "$NEED_BUILD" = "1" ]; then
              echo "→ npm run build"
              npm run build
              printf '%s' "$SRC_HASH" > "$BUILD_HASH_FILE"
            else
              echo "→ skip build (sources unchanged since last deploy)"
            fi

            # Migrations are cheap when none pending
            echo "→ migrate:prod"
            npm run migrate:prod

            # Seed only when seed script changes; prefer compiled JS when available
            SEED_HASH="$(sha256sum src/scripts/seed-circles.ts | awk '{print $1}')"
            SEED_HASH_FILE=".seed-circles.hash"
            if [ ! -f "$SEED_HASH_FILE" ] || [ "$SEED_HASH" != "$(cat "$SEED_HASH_FILE")" ]; then
              echo "→ seed:circles"
              if [ -f dist/scripts/seed-circles.js ]; then
                node dist/scripts/seed-circles.js
              else
                npm run seed:circles
              fi
              printf '%s' "$SEED_HASH" > "$SEED_HASH_FILE"
            else
              echo "→ skip seed (unchanged)"
            fi

            # Reload only if code changed; otherwise still refresh env lightly
            if [ "$PREV_SHA" = "$NEW_SHA" ] && [ "$NEED_BUILD" = "0" ]; then
              echo "→ no code changes; ensuring process is up"
              if ! pm2 describe anchor-backend >/dev/null 2>&1; then
                pm2 start dist/server.js --name anchor-backend
                pm2 save
              fi
            else
              if pm2 describe anchor-backend >/dev/null 2>&1; then
                # Zero-downtime reload when supported
                pm2 reload anchor-backend --update-env || pm2 restart anchor-backend --update-env
              else
                pm2 start dist/server.js --name anchor-backend
                pm2 save
              fi
            fi

            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
                curl -fsS http://127.0.0.1:3000/health
                exit 0
              fi
              sleep 1
            done

            echo "Health check failed after waiting for the app to start" >&2
            pm2 logs anchor-backend --lines 50 --nostream
            exit 1
