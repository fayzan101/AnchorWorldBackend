# Production — API container
#
# Use when MySQL already runs on the host (current app.anchorworld.org setup).
# Set DB_HOST=host.docker.internal in .env
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anchor-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override in .env if needed; host.docker.internal reaches host MySQL from container
      DB_HOST: ${DB_HOST:-host.docker.internal}
    volumes:
      - anchor_uploads:/app/uploads
      # Optional: comment out if firebase JSON is not on the server yet
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  anchor_uploads:
