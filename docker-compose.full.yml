# Full stack — API + MySQL in Docker (staging / fresh server)
#
#   docker compose -f docker-compose.full.yml up -d --build
#
# Copy .env.docker.example to .env and adjust secrets before production use.
#
services:
  mysql:
    image: mysql:8.0
    container_name: anchor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-anchor_root}
      MYSQL_DATABASE: ${DB_DATABASE:-anchor_db}
      MYSQL_USER: ${DB_USERNAME:-anchor_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-anchor_pass}
    volumes:
      - anchor_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anchor-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - anchor_uploads:/app/uploads
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  anchor_mysql_data:
  anchor_uploads:
